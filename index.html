<script>
const QS=[
  {id:1,cat:"React Fundamentals",q:"What is React?",avg:"React is a JavaScript library for building user interfaces.",top:`React is a JavaScript library developed by Facebook (now Meta) for building user interfaces. What makes React special is three things:

1. Component-Based Architecture — the UI is broken into small, reusable LEGO-like pieces called components. Each block is independent but together they build something amazing.

2. Virtual DOM — React doesn't directly manipulate the browser's DOM (which is slow). It keeps a lightweight copy called Virtual DOM. When data changes, React compares the new Virtual DOM with the old one, calculates the minimum changes needed, and updates only those specific parts.

3. Declarative Approach — we tell React WHAT we want the UI to look like, not HOW to update it.`},

  {id:2,cat:"React Fundamentals",q:"What is Virtual DOM? How does it improve performance?",avg:"Virtual DOM is a copy of the real DOM. It makes updates faster.",top:`Virtual DOM is a lightweight JavaScript representation of the actual DOM — essentially a JavaScript object that mirrors the structure of your UI.

How it works step by step:
1. When your app first loads, React creates a Virtual DOM tree.
2. When state changes (e.g. user clicks 'Add to Cart'), React creates a NEW Virtual DOM tree.
3. React performs 'diffing' — comparing the new Virtual DOM with the previous one.
4. React performs 'reconciliation' — it updates ONLY the changed parts in the real DOM.

Why is this faster? Direct DOM manipulation is expensive. Every time you touch the DOM, the browser may need to recalculate styles, reflow the layout, and repaint the screen. With Virtual DOM, React batches all changes and makes ONE optimised update — like making a shopping list before going to the store instead of making 10 separate trips.`,code:`// Real example from TechStore:
// When user types in search box, instead of removing
// and adding DOM elements for each keystroke,
// React calculates the minimum required change
// and makes one efficient update.`},

  {id:3,cat:"React Fundamentals",q:"What is the difference between Library and Framework?",avg:"",top:`A Library is a collection of pre-written code that YOU call when YOU need it. You're in control. React is a library — it handles the view layer, but you choose your routing solution, state management, etc.

A Framework provides a complete structure and calls YOUR code. The framework is in control. Angular is a framework — it dictates project structure, routing, forms, HTTP client, everything.

The key difference is Inversion of Control:
• Library: You call library code
• Framework: Framework calls your code

React being a library means:
• More flexibility — mix and match tools
• Smaller bundle if you don't need everything
• Steeper initial decisions (which router? which state manager?)

This is why the React ecosystem has many options — React Router, Redux, Zustand, etc. You choose what fits your needs.`},

  {id:4,cat:"React Fundamentals",q:"What are the advantages of React?",avg:"React has several key advantages.",top:`1. Component Reusability — write once, use everywhere. Change one component, all 50 instances update.

2. Virtual DOM Performance — efficient updates through diffing and reconciliation. Users experience smooth, fast interfaces even with frequent updates.

3. One-Way Data Flow — data flows from parent to child through props. This makes debugging easier because you always know where data comes from.

4. Rich Ecosystem — massive community, countless libraries, excellent tooling.

5. React Native — same concepts work for mobile development. Learn React, and you're 70% of the way to building iOS and Android apps.

6. Backed by Meta — used in production by Facebook, Instagram, WhatsApp. Battle-tested at massive scale.

7. Developer Experience — great dev tools, hot reloading, helpful error messages.`},

  {id:5,cat:"JSX",q:"What is JSX?",avg:"",top:`JSX stands for JavaScript XML. It's a syntax extension that allows us to write HTML-like code inside JavaScript.

Important clarification: JSX is NOT HTML. It's NOT valid JavaScript either. It's a special syntax that gets transformed by tools like Babel into regular JavaScript function calls.`,code:`// This JSX:
<h1 className="title">Hello</h1>

// Becomes this JavaScript:
React.createElement('h1', { className: 'title' }, 'Hello')

// Why use JSX? It's far more readable than writing
// React.createElement everywhere.`},

  {id:6,cat:"JSX",q:"Can you write JavaScript inside JSX? How?",avg:"",top:`Yes! We use curly braces {} to embed any JavaScript expression inside JSX.

Expressions (allowed):
• Variables: {name}
• Math: {price * 0.9}
• Ternary: {isActive ? 'Yes' : 'No'}
• Function calls: {formatPrice(price)}
• Array methods: {items.map(...)}

Statements (NOT allowed):
• if/else blocks
• for/while loops
• switch statements
• Variable declarations

Why this restriction? JSX compiles to function arguments. You can't put an if statement as a function argument, but you can put an expression.`,code:`return (
  <div>
    <h1>Hello, {name}!</h1>
    <p>Price: ₹{price.toLocaleString()}</p>
    <p>Discounted: ₹{price * 0.9}</p>
    <p>In Stock: {inStock ? 'Yes' : 'No'}</p>
  </div>
);`},

  {id:7,cat:"JSX",q:"Why do we use className instead of class?",avg:"",top:`Because 'class' is a reserved keyword in JavaScript. In JavaScript, 'class' is used to define classes:

class Person { constructor(name) { this.name = name; } }

Since JSX is JavaScript, using 'class' would create a conflict. The parser wouldn't know if you mean the CSS class or a JavaScript class declaration.

Similarly: 'for' → 'htmlFor' (because 'for' is reserved for loops).

Other JSX-specific differences:
• All attributes are camelCase: onclick → onClick, onchange → onChange
• Boolean attributes: <input disabled /> instead of disabled="disabled"
• Style is an object: style={{ color: 'red', fontSize: '16px' }}

This is a common interview trap question — they want to see you understand that JSX is JavaScript, not HTML.`},

  {id:8,cat:"JSX",q:"What are the rules of JSX?",avg:"",top:`Rule 1 — Single Parent Element: Every JSX expression must have ONE parent element. Wrap in a <div> or use a Fragment <> </> to avoid adding extra DOM nodes.

Rule 2 — Close All Tags: Every tag must be closed, including self-closing ones. <img src="photo.jpg" /> and <input type="text" /> — NOT <img> or <input>.

Rule 3 — camelCase Attributes: HTML attributes become camelCase. onclick → onClick, onchange → onChange, tabindex → tabIndex.

Rule 4 — JavaScript Expressions in Curly Braces: Dynamic values go in {}.

Rule 5 — className and htmlFor: Use these instead of class and for.

Why single parent? Because JSX compiles to React.createElement(). A function can only return ONE thing — the parent element is that one thing containing everything else.`,code:`// Wrong — two siblings at root
return ( <h1>Title</h1> <p>Content</p> ) // Error!

// Correct — wrapped in parent
return ( <div><h1>Title</h1><p>Content</p></div> )

// Or use Fragment to avoid extra div
return ( <><h1>Title</h1><p>Content</p></> )`},

  {id:9,cat:"Components",q:"What is a Component in React?",avg:"",top:`A component is the fundamental building block of React applications. It's a self-contained, reusable piece of UI that manages its own structure, style, and behaviour.

Think of it like a custom HTML element. Just as HTML has <button>, <input>, etc., React lets us create our own elements like <ProductCard>, <SearchBox>, <Navbar>.

Components can:
• Receive data via props
• Manage their own state
• Render other components
• Be reused multiple times with different data

Types of Components:
1. Function Components (Modern, Recommended)
2. Class Components (Legacy)`,code:`// Function Component (recommended)
function ProductCard({ name, price }) {
  return <div>{name} — ₹{price}</div>;
}

// Class Component (legacy)
class ProductCard extends React.Component {
  render() {
    return <div>{this.props.name}</div>;
  }
}`},

  {id:10,cat:"Components",q:"Function Components vs Class Components?",avg:"",top:`Function Components are the modern, recommended approach. Class Components are legacy.

Key Differences:
• Syntax: Function is a simple function; Class needs ES6 class with render()
• State: Function uses useState hook; Class uses this.state
• Lifecycle: Function uses useEffect hook; Class uses componentDidMount, etc.
• 'this' keyword: Not needed in functions; Required everywhere in classes
• Boilerplate: Functions are minimal; Classes are verbose
• Performance: Functions are slightly better

Why Function Components are preferred:
1. Less code — no constructor, no render method, no this binding
2. Easier to understand — just a function that returns JSX
3. Hooks are powerful — useState, useEffect, custom hooks
4. Better optimisation — easier for React to optimise
5. Industry standard — all modern React code uses functions`,code:`// Function Component
function Counter() {
  const [count, setCount] = useState(0);
  return (
    <button onClick={() => setCount(count + 1)}>
      Count: {count}
    </button>
  );
}

// Class Component (legacy)
class Counter extends React.Component {
  constructor(props) {
    super(props);
    this.state = { count: 0 };
  }
  render() {
    return (
      <button onClick={() => this.setState({ count: this.state.count + 1 })}>
        Count: {this.state.count}
      </button>
    );
  }
}`},

  {id:11,cat:"Components",q:"Why must component names start with a capital letter?",avg:"",top:`This is how React distinguishes between DOM elements and custom components.

• Lowercase = DOM element: <div>, <button>, <span> → renders actual HTML
• Uppercase = Custom Component: <ProductCard />, <SearchBox /> → renders your component

What happens internally when JSX is compiled:
• <div> → React.createElement('div', ...) — String = DOM element
• <ProductCard> → React.createElement(ProductCard, ...) — Variable = Component

If you use lowercase for a component:
React thinks it's a DOM element called 'productcard' → Error: "productcard is not a valid HTML element"

Naming Conventions:
• Components: PascalCase — ProductCard, SearchBox, UserProfile
• Files: usually match component name — ProductCard.jsx
• Variables/functions: camelCase — handleClick, isLoading`},

  {id:12,cat:"Props",q:"What are Props?",avg:"",top:`Props (short for properties) are the mechanism for passing data from a parent component to a child component. They are the React equivalent of function parameters.

Key Characteristics:
1. Read-Only (Immutable) — child components cannot modify the props they receive.
2. One-Way Flow — data only flows DOWN, from parent to child. Never up.
3. Any Data Type — strings, numbers, booleans, objects, arrays, functions — anything can be a prop.

Props make components reusable. ProductCard doesn't hardcode "iPhone 15" — it receives whatever the parent passes. The same component can show iPhone, MacBook, or any product.`,code:`// Parent Component
function App() {
  return (
    <ProductCard
      name="iPhone 15"             // String
      price={99999}                // Number
      inStock={true}               // Boolean
      features={['5G','USB-C']}    // Array
      onBuy={() => alert('Bought!')} // Function
    />
  );
}

// Child Component
function ProductCard({ name, price, inStock, onBuy }) {
  return (
    <div>
      <h2>{name}</h2>
      <p>₹{price}</p>
      <p>{inStock ? 'In Stock' : 'Out of Stock'}</p>
      <button onClick={onBuy}>Buy Now</button>
    </div>
  );
}`},

  {id:13,cat:"Props",q:"Can you modify props inside a component?",avg:"",top:`No. Props are read-only (immutable).

While JavaScript technically allows mutating props (no runtime error), it violates React's principles and can cause bugs.

Why are props immutable?
1. Predictability — if props could change anywhere, you'd never know the current value.
2. One-Way Data Flow — if child could change props, you'd have unpredictable bidirectional flow.
3. Debugging — when something's wrong, check the parent. You don't have to trace through multiple components.
4. Pure Functions — components should be like pure functions: same input (props) = same output (UI).

If you need to modify data:
1. Local State — copy the prop into state: const [price, setPrice] = useState(initialPrice)
2. Callback Props — child asks the parent to modify by calling a callback function`,code:`// Wrong
function ProductCard({ price }) {
  price = price * 0.9; // This is WRONG — violates React principles
  return <p>₹{price}</p>;
}

// Correct — use local state
function ProductCard({ initialPrice }) {
  const [price, setPrice] = useState(initialPrice);
  // Now you can modify 'price' state safely
}`},

  {id:14,cat:"Props",q:"What is Prop Drilling? Is it a problem?",avg:"",top:`Prop drilling is when you pass props through multiple layers of components that don't need them, just to get data to a deeply nested component.

Example — App has user data, but UserAvatar (5 levels deep) needs it. Layout, Sidebar, UserSection don't need user but each passes it along like a bucket brigade.

Why is it a problem?
1. Cluttered Code — intermediate components have props they don't use
2. Maintenance Nightmare — adding a new prop means updating every component in the chain
3. Refactoring Difficulty — moving components breaks the chain
4. Harder to Understand — where does this prop come from? Follow 5 levels up...

Solutions:
1. Context API — React's built-in solution (createContext + Provider + useContext)
2. State Management Libraries — Redux, Zustand, Jotai
3. Component Composition — restructure components
4. Custom Hooks — share stateful logic

When is prop drilling okay? For 2-3 levels, it's fine and explicit. Only reach for Context or Redux when drilling becomes painful — usually 4+ levels.`},

  {id:15,cat:"Props",q:"What are Default Props?",avg:"",top:`Default props are fallback values used when a prop is not provided by the parent.

Modern Approach (Default Parameters — recommended): Cleaner and works with TypeScript better.

Why use default props?
1. Prevents undefined errors — without defaults, calling .toFixed() on undefined crashes the app
2. Simpler parent components — don't have to pass everything every time
3. Self-documenting — shows what values make sense`,code:`// Modern approach — default parameters
function ProductCard({
  name = 'Unknown Product',
  price = 0,
  currency = '₹',
  inStock = true
}) {
  return (
    <div>
      <h2>{name}</h2>
      <p>{currency}{price}</p>
      <p>{inStock ? 'Available' : 'Sold Out'}</p>
    </div>
  );
}

// Usage — currency and inStock use their defaults
<ProductCard name="iPhone" price={999} />`},

  {id:16,cat:"State (useState)",q:"What is State in React?",avg:"",top:`State is data that belongs to a component and can change over time. When state changes, React automatically re-renders the component to reflect the new data.

State vs Regular Variables:
Regular variables don't trigger re-renders! React doesn't "watch" your variables. It has no idea the variable changed. The function ran once, created the button with "0", and that's it.

With state, calling setCount does two things:
1. Updates the value
2. Tells React to re-run the component function

Key Characteristics:
1. Local and Private — each component instance has its own state
2. Triggers Re-render — changing state causes the component to re-render
3. Preserved Between Renders — React remembers state values across re-renders
4. Initialised Once — initial value is only used on the first render`,code:`// Regular variable — screen never updates!
function Counter() {
  let count = 0;
  function handleClick() { count = count + 1; } // value changes in memory, but screen still shows 0!
  return <button onClick={handleClick}>{count}</button>;
}

// State — screen updates correctly
function Counter() {
  const [count, setCount] = useState(0);
  function handleClick() { setCount(count + 1); } // value changes AND screen updates!
  return <button onClick={handleClick}>{count}</button>;
}`},

  {id:17,cat:"State (useState)",q:"What is the difference between Props and State?",avg:"",top:`This is one of the most important distinctions in React.

Aspect         | Props                  | State
---------------|------------------------|------------------
Owner          | Parent component       | Component itself
Mutability     | Immutable (read-only)  | Mutable (via setter)
Direction      | Flows down (parent→child) | Stays within component
Who changes it | Parent                 | Component itself
Purpose        | Configure component    | Track changing data

Mental Model — Think of a TV:
• Props are like the TV model, screen size, brand — set by manufacturer, you can't change them
• State is like the volume, channel, brightness — you control these, they change during use

In TechStore:
• name, price, image are props — ProductCard receives them from App
• cartItems, searchTerm are state — App manages them internally
• isWishlisted is a prop derived from state — App calculates it, passes to ProductCard`},

  {id:18,cat:"State (useState)",q:"What is useState? Explain its syntax.",avg:"",top:`useState is a React Hook that lets you add state to function components.

Syntax: const [value, setValue] = useState(initialValue)

Breaking it down:
• value = current state value
• setValue = setter function (to update state)
• initialValue = the starting value (only used on first render)

useState returns an array with exactly 2 elements. Array destructuring lets us name them whatever we want. Convention is [thing, setThing].

Lazy Initialisation: If initial value requires computation, pass a function — useState(() => expensiveCalculation()) — it runs only on first render, not every re-render.`,code:`const [count, setCount] = useState(0);       // Number
const [name, setName] = useState('');        // Empty string
const [isOpen, setIsOpen] = useState(false); // Boolean
const [items, setItems] = useState([]);      // Empty array
const [user, setUser] = useState(null);      // Null

// Multiple states in one component
function Form() {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [age, setAge] = useState(0);
  // Each state is independent
}`},

  {id:19,cat:"State (useState)",q:"Why can't we modify state directly?",avg:"",top:`You cannot modify state directly because React won't know the state changed and won't re-render.

React uses the setter function as a signal that state changed. When you call setCount:
1. React schedules an update
2. React re-runs your component function
3. useState returns the NEW value
4. New JSX is created with new value
5. React updates the DOM

Without the setter, React has no signal. It doesn't watch variables for changes.`,code:`// Wrong — Direct modification
const [count, setCount] = useState(0);
function handleClick() {
  count = count + 1;    // React has no idea this happened!
  setCount(count);      // Reference didn't change, still broken
}

// Correct — Using setter properly
function handleClick() {
  setCount(count + 1); // React knows, triggers re-render ✓
}

// For objects/arrays — always create new ones
const [items, setItems] = useState([1, 2, 3]);
// Wrong:  items.push(4); setItems(items); // Same reference!
// Correct: setItems([...items, 4]);        // New array ✓`},

  {id:20,cat:"State (useState)",q:"What are the Rules of Hooks?",avg:"",top:`Rule 1 — Only call hooks at the top level. Never inside conditions, loops, or nested functions.

Why? React tracks hooks by the ORDER they're called. On each render, React expects hooks in the same order. If a condition skips a hook, React gets confused about which hook value belongs to which hook.

Rule 2 — Only call hooks in React function components or custom hooks. Never in regular JavaScript functions or class components.

Rule 3 — State updates may be batched. Calling the setter multiple times in one event handler may only trigger one re-render. Use functional updates when new state depends on old state.`,code:`// Rule 1 violations:
if (someCondition) { const [v, setV] = useState(0); } // Error!
for (let i = 0; i < 3; i++) { useState(0); }          // Error!

// Rule 1 correct:
function Component() {
  const [value, setValue] = useState(0); // Always at top level
  if (someCondition) { /* use value here */ }
}

// Rule 3 — Batching problem:
setCount(count + 1); setCount(count + 1); setCount(count + 1);
// Count only increases by 1, not 3!

// Rule 3 fix — Functional updates:
setCount(prev => prev + 1);
setCount(prev => prev + 1);
setCount(prev => prev + 1);
// Count correctly increases by 3 ✓`},

  {id:21,cat:"Arrays in React",q:"How do you render a list in React?",avg:"",top:`We use the .map() array method to transform data into JSX elements.

How it works:
1. .map() iterates over each item in array
2. For each item, we return a JSX element
3. .map() returns a new array of JSX elements
4. React renders that array

Important: every item needs a unique key prop so React can efficiently update the list.

In TechStore, we render 50 products this way. The code is the same whether we have 5 or 5000 products — data drives the UI.`,code:`const products = [
  { id: 1, name: 'iPhone', price: 999 },
  { id: 2, name: 'MacBook', price: 1999 },
  { id: 3, name: 'iPad', price: 799 }
];

function ProductList() {
  return (
    <div>
      {products.map(product => (
        <ProductCard
          key={product.id}      // Required! Unique identifier
          name={product.name}
          price={product.price}
        />
      ))}
    </div>
  );
}`},

  {id:22,cat:"Arrays in React",q:"Why can't we use forEach to render lists?",avg:"",top:`Because forEach returns undefined, while map returns a new array.

Inside {} in JSX, JSX expects an expression that produces a value. For lists, it needs an array of elements.
• map produces: [<Card/>, <Card/>, <Card/>] ✓
• forEach produces: undefined ✗

Other useful methods for lists:
• .filter().map() — filter then render
• .sort().map() — sort then render
• .slice().map() — paginate then render

Always end with .map() because that's what produces the array of elements that React can render.`,code:`// forEach — nothing renders!
return (
  <div>
    {products.forEach(p => <ProductCard key={p.id} name={p.name} />)}
  </div>
); // forEach returns undefined, React renders nothing

// map — renders correctly
return (
  <div>
    {products.map(p => <ProductCard key={p.id} name={p.name} />)}
  </div>
); // map returns array of components, React renders them ✓`},

  {id:23,cat:"Arrays in React",q:"What is the key prop and why is it important?",avg:"",top:`The key prop is a special attribute that helps React identify which items in a list have changed, been added, or removed.

When a list updates, React needs to figure out: which items are new, which were removed, which changed, which just moved.

Without keys, React has to guess — it may re-render both B and C unnecessarily. With keys, React sees B and C just moved, so it rearranges DOM nodes with no re-render needed.

What makes a good key?
1. Unique — no two siblings should have the same key
2. Stable — should not change over time
3. From data — should come from your data, not generated

Good keys: key={product.id}, key={user.email}, key={item.sku}
Bad keys: key={index} (changes when list changes!), key={Math.random()} (different every render!)`,code:`// Good keys — from data
{products.map(product => (
  <ProductCard key={product.id} name={product.name} />
))}

// Bad — using array index
{products.map((product, index) => (
  <ProductCard key={index} name={product.name} />
))} // Causes bugs when list is sorted, filtered, or items removed!

// Bad — generated keys
{products.map(product => (
  <ProductCard key={Math.random()} /> // Different every render!
))}`},

  {id:24,cat:"Conditional Rendering",q:"What is Conditional Rendering?",avg:"",top:`Conditional rendering means showing different UI based on conditions. It's like if-else in programming but for rendering components.

Three Main Approaches:

1. Ternary Operator (for if-else):
{isLoggedIn ? <Dashboard /> : <Login />}
Use when: you have two different things to show.

2. Logical AND (for if only, no else):
{isAdmin && <AdminPanel />}
Use when: show something or nothing (no else case).
⚠️ Gotcha with &&: {count && <span>{count}</span>} shows "0" on screen when count is 0 because 0 is falsy but React renders it as text! Fix: {count > 0 && <span>{count}</span>}

3. If-else outside JSX (variable assignment):
Use when: multiple conditions or complex logic.

Why can't we use if-else directly inside JSX? JSX only accepts expressions (things that produce a value), not statements. if-else is a statement.`,code:`// 1. Ternary — two options
{isLoggedIn ? <Dashboard /> : <Login />}

// 2. AND — show or nothing
{cartCount > 0 && <span className="badge">{cartCount}</span>}

// 3. If-else outside JSX
function Component() {
  let content;
  if (isLoading) content = <Spinner />;
  else if (error) content = <Error message={error} />;
  else content = <Data items={items} />;
  return <div>{content}</div>;
}`},

  {id:25,cat:"Controlled Components",q:"What is a Controlled Component?",avg:"",top:`A controlled component is a form element whose value is controlled by React state rather than the DOM.

Uncontrolled (Traditional HTML): The DOM controls the value. You read from it when needed.
<input type="text" id="name" /> then document.getElementById('name').value

Controlled (React Way): React state controls the value. The DOM just displays what state says.

The Flow:
User types 'A' → onChange fires → setValue('A') updates state → Component re-renders → Input receives value="A" → Input displays 'A'

Why use Controlled Components?
1. Single Source of Truth — value is in state, not split between state and DOM
2. Instant Access — don't need to query DOM to get value
3. Validation/Transformation — intercept and transform input as it's typed
4. Dynamic Behaviour — use value length to show character count, etc.`,code:`function SearchBox() {
  const [value, setValue] = useState('');

  return (
    <input
      type="text"
      value={value}                              // Displays state value
      onChange={(e) => setValue(e.target.value)} // Updates state on change
    />
  );
}

// In TechStore:
<input
  value={searchTerm}
  onChange={(e) => setSearchTerm(e.target.value)}
/>
// As user types, searchTerm updates state,
// component re-renders, filtered products show.`},

  {id:26,cat:"Scenario-Based",q:"You click a button to increment a counter but the UI doesn't update. What could be wrong?",avg:"",top:`There are several possible causes. Debug systematically:

1. Not using State — using a regular variable instead of useState. React doesn't know it changed.
Fix: const [count, setCount] = useState(0)

2. Directly modifying state — doing count++ then setCount(count). The increment happened before telling React.
Fix: setCount(count + 1) properly.

3. Wrong onClick syntax — onClick={setCount(count + 1)} calls the function immediately on render, not on click!
Fix: onClick={() => setCount(count + 1)} or onClick={handleClick}

4. Array/Object mutation — using .push() on state array then passing the same reference.
Fix: setItems([...items, newItem])

5. State in wrong component — state is updating but in a different component than the one displaying it. Check component hierarchy.`,code:`// Mistake 1 — Regular variable
let count = 0; // React never knows it changed

// Mistake 2 — Wrong onClick syntax
onClick={setCount(count + 1)}    // Calls on render, not click!
onClick={() => setCount(count + 1)} // Correct ✓

// Mistake 3 — Array mutation
items.push(4);
setItems(items);        // Same reference, no re-render!
setItems([...items, 4]); // New array, triggers re-render ✓`},

  {id:27,cat:"Scenario-Based",q:"How would you implement a search filter for a product list?",avg:"",top:`Walk through the implementation step by step:

Step 1: Set up state for search term.
Step 2: Create a controlled input bound to that state.
Step 3: Filter products based on the search term using .filter() and .includes() with toLowerCase() for case-insensitive matching.
Step 4: Render the filtered products array with .map().

Enhancements to mention in interviews:
• Debounce for performance with large lists
• Search across multiple fields (name, brand, description)
• Clear button when search has value
• Highlight matching text`,code:`function ProductList() {
  const [searchTerm, setSearchTerm] = useState('');

  const filteredProducts = products.filter(product =>
    product.name.toLowerCase().includes(searchTerm.toLowerCase())
  );

  return (
    <div>
      <input
        type="text"
        placeholder="Search products..."
        value={searchTerm}
        onChange={(e) => setSearchTerm(e.target.value)}
      />
      <p>Showing {filteredProducts.length} products</p>
      {filteredProducts.length > 0
        ? filteredProducts.map(product => (
            <ProductCard key={product.id} {...product} />
          ))
        : <p>No products found for "{searchTerm}"</p>
      }
    </div>
  );
}`},

  {id:28,cat:"Scenario-Based",q:"How would you lift state up? When would you do it?",avg:"",top:`Lifting state up means moving state from a child component to a common ancestor when multiple components need access to the same data.

When to lift state:
• Two sibling components need to share state
• Parent needs to know about child's state
• Multiple components need to stay in sync

The principle: State should live in the lowest common ancestor of all components that need it.

In TechStore — Cart state is in App.jsx, not ProductCard.jsx, because:
• Navbar needs cart count
• Cart summary needs cart total
• Multiple ProductCards can add to the same cart

If each ProductCard had its own cart state, they couldn't share. By lifting to App, all components can access cart through props.`,code:`// Before lifting — each input has its own state (can't sync)
function CelsiusInput() {
  const [celsius, setCelsius] = useState(0); // isolated!
}
function FahrenheitInput() {
  const [fahrenheit, setFahrenheit] = useState(32); // isolated!
}

// After lifting — state lives in parent (stay in sync)
function TemperatureCalculator() {
  const [celsius, setCelsius] = useState(0); // Lifted here

  return (
    <div>
      <TemperatureInput value={celsius} onChange={setCelsius} />
      <TemperatureInput
        value={(celsius * 9/5) + 32}
        onChange={val => setCelsius((val - 32) * 5/9)}
      />
    </div>
  );
}`},

  {id:29,cat:"Scenario-Based",q:"How would you add an item to a cart without mutating state?",avg:"",top:`This is crucial for React state management. The core principle: never modify existing state. Always create new arrays/objects with the updated data.

The Challenge: Cart is an array. We need to either add a new item OR increase quantity of an existing item.

Three key patterns:
1. Spread to create new array: [...cartItems, newItem] — never .push()
2. map() to create new array with updated object: cartItems.map(item => item.id === id ? {...item, qty: item.qty + 1} : item)
3. filter() to remove without mutation: cartItems.filter(item => item.id !== id)`,code:`function addToCart(product) {
  const existingItem = cartItems.find(item => item.id === product.id);

  if (existingItem) {
    // Update quantity — create new array with new object
    setCartItems(cartItems.map(item =>
      item.id === product.id
        ? { ...item, quantity: item.quantity + 1 } // New object!
        : item
    ));
  } else {
    // Add new item — create new array
    setCartItems([...cartItems, { ...product, quantity: 1 }]);
  }
}

const removeFromCart = (id) => {
  setCartItems(cartItems.filter(item => item.id !== id));
};

// The principle: Never modify existing state.
// Always create new arrays/objects with updated data.`},

  {id:30,cat:"Quick Fire",q:"Is React a library or framework?",avg:"",top:`Library. You call React, not the other way around. React handles only the view layer. You choose your own routing solution (React Router), state management (Redux/Zustand), HTTP client, etc. Angular is a framework — it dictates all of these for you.`},
  {id:31,cat:"Quick Fire",q:"Who developed React?",avg:"",top:`Facebook (now Meta). Released as open-source in 2013. Now maintained by Meta and the open-source community.`},
  {id:32,cat:"Quick Fire",q:"What is SPA?",avg:"",top:`Single Page Application. One HTML page; content changes dynamically without full page reloads. React apps are SPAs — the browser loads index.html once, then React handles all navigation and UI changes via JavaScript.`},
  {id:33,cat:"Quick Fire",q:"What is JSX?",avg:"",top:`JavaScript XML — a syntax extension to write HTML-like code inside JavaScript. Gets transformed by tools like Babel into React.createElement() calls. Not valid HTML, not valid plain JavaScript — it's special JSX syntax.`},
  {id:34,cat:"Quick Fire",q:"Can browsers read JSX directly?",avg:"",top:`No. Babel transforms JSX to JavaScript first. Browsers only understand HTML, CSS, and plain JavaScript — not JSX. That's why build tools like Vite/Webpack with Babel are needed in every React project.`},
  {id:35,cat:"Quick Fire",q:"What is Babel?",avg:"",top:`A JavaScript compiler that transforms modern JS and JSX into browser-compatible code. Converts JSX into React.createElement() calls, converts ES6+ syntax to ES5, and handles other transformations to ensure cross-browser compatibility.`},
  {id:36,cat:"Quick Fire",q:"What is npm?",avg:"",top:`Node Package Manager. Installs and manages JavaScript packages and libraries. Used to install React, all dependencies, and run scripts like npm start, npm run build, npm test.`},
  {id:37,cat:"Quick Fire",q:"What command creates a Vite React project?",avg:"",top:`npm create vite@latest project-name -- --template react

Then: cd project-name → npm install → npm run dev

Default port is 5173.`},
  {id:38,cat:"Quick Fire",q:"What is the entry point of a React app?",avg:"",top:`main.jsx — it renders the root App component into index.html's root div:
ReactDOM.createRoot(document.getElementById('root')).render(<App />)`},
  {id:39,cat:"Quick Fire",q:"What does <> </> mean?",avg:"",top:`React Fragment. Groups elements without adding an extra DOM node. Equivalent to <React.Fragment></React.Fragment>. Use it when you need a single parent wrapper but don't want an extra <div> cluttering the DOM.`},
  {id:40,cat:"Quick Fire",q:"What is the children prop?",avg:"",top:`Special prop containing content between a component's opening and closing tags. Example: <Button>Click me</Button> — "Click me" is available as props.children inside the Button component.`},
  {id:41,cat:"Quick Fire",q:"Can a component return multiple elements?",avg:"",top:`Yes, but they must be wrapped in a parent element or Fragment. A component must return one root element. Multiple elements must be grouped inside a <div> or <></>.`},
  {id:42,cat:"Quick Fire",q:"What is the default port for Vite?",avg:"",top:`5173. (Create React App used port 3000, but Vite defaults to 5173.)`},
  {id:43,cat:"Quick Fire",q:"How do you add comments in JSX?",avg:"",top:`Use {/* comment */} inside JSX markup. Regular // comments work in JavaScript code outside JSX, but inside JSX markup you must use the curly-brace syntax.`},
  {id:44,cat:"Quick Fire",q:"What is the spread operator used for in React?",avg:"",top:`Spreading props: <Component {...props} /> — passes all properties at once without listing each. Also used for immutable state updates: [...items, newItem] adds to an array without mutation, {...obj, key: newVal} updates an object property without mutation.`},
  {id:45,cat:"Quick Fire",q:"What are hooks?",avg:"",top:`Special functions that let you use React features (state, effects, context, etc.) in function components. They "hook into" React's internals. Must start with the "use" prefix. Examples: useState, useEffect, useContext, useRef, useMemo, useCallback.`},
  {id:46,cat:"Quick Fire",q:"Name some React hooks.",avg:"",top:`useState, useEffect, useContext, useRef, useMemo, useCallback, useReducer, useId, useLayoutEffect, useTransition, useDeferredValue — and you can also create custom hooks (any function starting with "use").`},
  {id:47,cat:"Quick Fire",q:"Can hooks be used in class components?",avg:"",top:`No. Hooks are only for function components (or custom hooks). Class components use this.state, this.setState(), and lifecycle methods (componentDidMount, componentDidUpdate, componentWillUnmount) instead.`},
  {id:48,cat:"Quick Fire",q:"What is the virtual DOM stored as?",avg:"",top:`A JavaScript object tree. It's a plain JS object that mirrors the structure of your UI — same hierarchy as the actual DOM, but much lighter because it's just data in memory, not real browser DOM nodes.`},
  {id:49,cat:"Quick Fire",q:"What triggers a re-render in React?",avg:"",top:`1. State change — calling a useState setter function triggers a re-render of that component.
2. Props change — when a parent re-renders and passes new props, the child re-renders.
3. Context change — when a Context value changes, all consumers re-render.
4. Parent re-render — when a parent re-renders, all its children re-render by default.`},
  {id:50,cat:"Quick Fire",q:"What is reconciliation?",avg:"",top:`React's process of comparing the new Virtual DOM tree with the previous one and updating only the changed parts in the real DOM. React uses the "diffing" algorithm to efficiently identify what changed, then performs the minimum number of DOM operations needed to bring the real DOM in sync with the new Virtual DOM.`},
];

const CATS=[...new Set(QS.map(q=>q.cat))];
let activeCat='All';
let done=new Set(JSON.parse(localStorage.getItem('react_done')||'[]'));
function save(){localStorage.setItem('react_done',JSON.stringify([...done]));}

function updateStats(){
  const vis=getVisible();
  const pct=QS.length?Math.round(done.size/QS.length*100):0;
  document.getElementById('s-total').textContent=vis.length;
  document.getElementById('s-done').textContent=done.size;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=pct+'%';
}

function getVisible(){
  const term=document.getElementById('search').value.toLowerCase();
  return QS.filter(q=>{
    const catMatch=activeCat==='All'||q.cat===q.cat&&q.cat===activeCat;
    const catOk=activeCat==='All'||q.cat===activeCat;
    const termOk=!term||q.q.toLowerCase().includes(term)||q.top.toLowerCase().includes(term);
    return catOk&&termOk;
  });
}

function renderCats(){
  const c=document.getElementById('cats');
  c.innerHTML='';
  ['All',...CATS].forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(cat===activeCat?' active':'');
    const count=cat==='All'?QS.length:QS.filter(q=>q.cat===cat).length;
    b.textContent=cat;
    const badge=document.createElement('span');
    badge.className='badge';badge.textContent=count;
    b.appendChild(badge);
    b.onclick=()=>{activeCat=cat;renderCats();renderQs();};
    c.appendChild(b);
  });
}

function renderQs(){
  const list=document.getElementById('qlist');
  const visible=getVisible();
  if(!visible.length){list.innerHTML='<div class="no-results">No questions match your search.</div>';updateStats();return;}
  list.innerHTML='';
  visible.forEach(q=>{
    const isDone=done.has(q.id);
    const card=document.createElement('div');
    card.className='q-card'+(isDone?' q-done':'');
    const codeHtml=q.code?`<div class="code-block">${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`:'';
    card.innerHTML=`
      <div class="q-header" onclick="toggleQ(${q.id})">
        <span class="q-num">Q${q.id}</span>
        <span class="q-title">${q.q}</span>
        <div class="q-icons">
          <div class="tick${isDone?' done':''}" onclick="event.stopPropagation();toggleDone(${q.id})" title="Mark complete">${isDone?'✓':'○'}</div>
          <span class="chev" id="chev-${q.id}">▾</span>
        </div>
      </div>
      <div class="q-body" id="body-${q.id}">
        ${q.avg?`<div class="avg-box"><div class="avg-lbl">Average answer</div><div class="avg-txt">${q.avg}</div></div>`:''}
        <div class="top-box">
          <div class="top-lbl">⭐ Top 1% answer</div>
          <div class="top-txt">${q.top.replace(/\n/g,'<br>')}</div>
          ${codeHtml}
        </div>
        <span class="tag">${q.cat}</span>
      </div>`;
    list.appendChild(card);
  });
  updateStats();
}

function toggleQ(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function toggleDone(id){
  if(done.has(id))done.delete(id);else done.add(id);
  save();renderQs();
}
function filterQs(){renderQs();}
function markAll(){getVisible().forEach(q=>done.add(q.id));save();renderQs();}
function resetAll(){if(confirm('Reset all progress?')){done.clear();save();renderQs();}}

renderCats();
renderQs();
</script>
